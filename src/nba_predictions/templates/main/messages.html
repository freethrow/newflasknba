{% extends "base.html" %}
{% block title %}Poruke{% endblock %}
{% block content %}
<h2>Poruke od admina</h2>
<a href="{{ url_for('main.send_message') }}" class="btn btn-primary mb-3">Pošalji poruku adminu</a>
{% for m in messages %}
<div class="card mb-2">
  <div class="card-body">
    <p>{{ m.body }}</p>
    <small class="text-muted">{{ m.created.strftime('%d.%m.%Y %H:%M') }}</small>
  </div>
</div>
{% else %}
<p class="text-muted">Nema poruka.</p>
{% endfor %}
{% endblock %}
