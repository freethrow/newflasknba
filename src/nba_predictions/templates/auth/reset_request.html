{% extends "base.html" %}
{% block title %}Reset lozinke{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <h2>Reset lozinke</h2>
    <form method="post">
      {{ form.csrf_token }}
      <div class="form-group">
        {{ form.username.label }}
        {{ form.username(class="form-control") }}
      </div>
      {{ form.submit(class="btn btn-primary btn-block") }}
    </form>
  </div>
</div>
{% endblock %}
