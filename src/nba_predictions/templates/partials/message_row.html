{% if sent is defined and sent %}
<tr>
  <td colspan="5" class="px-4 py-3">
    <span class="text-sm text-green-700 dark:text-green-300">Poruka poslata korisniku {{ recipient.username }}.</span>
  </td>
</tr>
{% else %}
<tr>
  <td colspan="5" class="px-4 py-2">
    <form method="post" action="{{ url_for('admin.send_to_user', user_id=recipient.id) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="flex gap-2">
        <textarea name="body" rows="2" required
                  class="flex-1 border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-800 rounded-md px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-nba-500"
                  placeholder="Poruka za {{ recipient.username }}..."></textarea>
        <button class="self-end px-3 py-2 bg-nba-500 hover:bg-nba-600 text-white text-sm font-medium rounded-md transition-colors">
          Pošalji
        </button>
      </div>
    </form>
  </td>
</tr>
{% endif %}
